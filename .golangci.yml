version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
  settings:
    errcheck:
      # Deferred Close calls on db rows/stmts and response bodies are conventional
      # in Go; ignoring their errors is the standard pattern. Suppress those.
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*database/sql.Stmt).Close
        - (io.Closer).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
