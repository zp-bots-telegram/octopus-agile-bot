<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded-square background, dark-to-blue diagonal gradient. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <!-- Gold→amber gradient for the bolt body. -->
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffe066"/>
      <stop offset="60%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Subtle glow behind the bolt. -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%"  stop-color="#fde68a" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Clock ring: ticks the hour marks to suggest time-of-use pricing. -->
  <g stroke="#cbd5e1" stroke-opacity="0.35" stroke-linecap="round">
    <circle cx="256" cy="256" r="188" fill="none" stroke-width="4"/>
    <g>
      <!-- 12 hour ticks around the ring. -->
      <line x1="256" y1="52"  x2="256" y2="80"  stroke-width="10"/>
      <line x1="460" y1="256" x2="432" y2="256" stroke-width="10"/>
      <line x1="256" y1="460" x2="256" y2="432" stroke-width="10"/>
      <line x1="52"  y1="256" x2="80"  y2="256" stroke-width="10"/>
      <line x1="358" y1="74"  x2="346" y2="94"  stroke-width="6"/>
      <line x1="438" y1="154" x2="418" y2="166" stroke-width="6"/>
      <line x1="438" y1="358" x2="418" y2="346" stroke-width="6"/>
      <line x1="358" y1="438" x2="346" y2="418" stroke-width="6"/>
      <line x1="154" y1="438" x2="166" y2="418" stroke-width="6"/>
      <line x1="74"  y1="358" x2="94"  y2="346" stroke-width="6"/>
      <line x1="74"  y1="154" x2="94"  y2="166" stroke-width="6"/>
      <line x1="154" y1="74"  x2="166" y2="94"  stroke-width="6"/>
    </g>
  </g>

  <!-- Glow halo. -->
  <circle cx="256" cy="256" r="170" fill="url(#glow)"/>

  <!-- Lightning bolt: classic jagged shape, centered. -->
  <path
    d="M294 88 L170 280 L236 280 L210 424 L348 216 L278 216 Z"
    fill="url(#bolt)"
    stroke="#7c2d12"
    stroke-opacity="0.35"
    stroke-width="6"
    stroke-linejoin="round"/>
</svg>
